<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвентор валют</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Конвертор валют</h1>


        <div class="converter-card">
            <div class="input-group">
                <label for="amount">Сумма</label>
                <input type="number" id="amount" placeholder="Введите сумму" step="any">
            </div>

            <div class="input-group">
                <label for="currency">Валюта</label>
                <select id="currency">
                    <option value="RUB">Российский рубль</option>
                    <option value="USD">Доллар США</option>
                    <option value="EUR">Евро</option>
                    <option value="CNY">Китайский юань</option>
                </select>
            </div>

            <button id="convertBtn">Конвертировать</button>

            <div class="result" id="result">
                Введите сумму и выберите валюту
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
